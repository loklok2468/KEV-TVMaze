<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-
scale=1.0, user-scalable=no">
        <meta charset="utf-8">
        <title>Search News - Kevs News</title>
        <meta name="description" content="Latest sports news, game coverage, and athlete interviews. Stay updated with live scores and match analysis.">
        <script src="https://cdn.tailwindcss.com"></script>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
        
        <script src="https://kit.fontawesome.com/2276178eda.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body id="search-page">
       <nav class="bg-slate-800 border-b border-slate-700 shadow-lg">

            <div class="container mx-auto px-4 flex items-center justify-between py-6">

            <!-- LEFT GROUP (Logo + Search) -->
            <div class="flex items-center gap-6">

                <a class="text-3xl text-white brand-link noto-sans" href="index.html">
                    KEVS News
                </a>

                <a class="text-gray-200 hover:text-blue-600 flex items-center gap-2 mt-2" href="search.html">
                    <i class="fa-solid fa-search text-blue-200"></i>
                    Search
                </a>

            </div>

            <!-- RIGHT GROUP (Nav links) -->
            <ul class="hidden md:flex items-center gap-4">

                <li>
                    <a class="text-gray-200 hover:text-blue-600 flex items-center gap-3" href="index.html">
                        <i class="fa-solid fa-house text-blue-200"></i>Home |
                        
                    </a>
                </li>

                <li>
                    <a class="text-gray-200 hover:text-blue-600 flex items-center gap-3" href="sport.html">
                        <i class="fa-solid fa-football text-blue-200"></i>Sport |
                    </a>
                </li>

                <li>
                    <a class="text-gray-200 hover:text-blue-600 flex items-center gap-3" href="education.html">
                        <i class="fa-solid fa-book text-blue-200"></i>Educa. |
                    </a>
                </li>

                <li>
                    <a class="text-gray-200 hover:text-blue-600 flex items-center gap-3" href="gaming.html">
                        <i class="fa-solid fa-gamepad text-blue-200"></i>Games |
                    </a>
                </li>

            </ul>

        </div>
            
        </nav>

        <div class="container mx-auto px-6 mt-6">
            
            <h1 class="text-3xl font-bold">Search Shows</h1>
            
            
            <form id="search-form" class="mt-4 max-w-md" onsubmit="searchShows(event)">

            <div class="grid grid-cols-6 gap-2 items-center">

                <input type="text" id="keywords"
                placeholder="Enter search here…"
                class="col-span-4 w-full border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">

                <button type="submit"
                class="col-span-2 bg-blue-500 text-white px-2 py-1 text-sm rounded hover:bg-blue-600">
                    Search
                </button>

            </div>

            </form>

            
            <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4"></div>

        </div>

        <script src="./js/search.js"></script>
        <script>loadShows('search');</script>
        
        <div class="flex justify-center gap-2 mt-6">
            <button onclick="loadShows('{sectionName}', 1)">1</button>
            <button onclick="loadShows('{sectionName}', 2)">2</button>
            <button onclick="loadShows('{sectionName}', 3)">3</button>
            <button onclick="loadShows('{sectionName}', 4)">4</button>
        </div>

        <footer class="bg-slate-800 text-white text-center py-6 mt-16">

        <p class="mt-3">
            © 2026 KEVS News.
        </p>

        <p class="text-sm text-gray-300">
            This website is a student project for educational purposes.
        </p>

      </footer>  

    </body>
</html>
